<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sem conexão — Freelandoo</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 24px;
        background: #ffc600;
        color: #0b0b0d;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      img { width: 96px; height: 96px; border-radius: 22px; }
      h1 { font-size: 1.6rem; margin: 0; font-weight: 800; letter-spacing: -0.01em; }
      p { margin: 0; max-width: 28ch; font-size: 0.98rem; line-height: 1.5; opacity: 0.8; }
      button {
        margin-top: 4px;
        border: 2px solid #0b0b0d;
        background: #0b0b0d;
        color: #ffc600;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.8rem;
        padding: 12px 22px;
        border-radius: 999px;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192.png" alt="Freelandoo" />
    <h1>Você está offline</h1>
    <p>Não conseguimos carregar a Freelandoo agora. Verifique sua conexão e tente de novo.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </body>
</html>
